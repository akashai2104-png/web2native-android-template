<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f8fafc;
      color: #334155;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 320px; }
    .icon {
      width: 64px; height: 64px; margin: 0 auto 20px;
      background: #e2e8f0; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 32px; height: 32px; stroke: #94a3b8; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: #1e293b; }
    p { font-size: 14px; line-height: 1.5; color: #64748b; margin-bottom: 24px; }
    button {
      background: #3b82f6; color: white; border: none; padding: 12px 28px;
      border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer;
      transition: background 0.2s;
    }
    button:active { background: #2563eb; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>No internet connection available. Cached content may be shown when possible. Tap retry to try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
